#!/bin/bash
# =============================================================================
# Pipeline Configuration - Retail Banking Customer Analytics
# =============================================================================
# Environment: DEV | UAT | PROD
# Last Updated: 2026-04-10
# =============================================================================

# -- Teradata Connection -------------------------------------------------------
export TD_SERVER="tdprod.corp.bankdemo.com"
export TD_USERNAME="${TD_USERNAME:-svc_etl_pipeline}"
export TD_LOGMECH="LDAP"

# -- Database References -------------------------------------------------------
export DB_CORE="CORE_BANKING_DB"          # Operational customer/account data
export DB_TXN="TXN_PROCESSING_DB"         # Transaction processing tables
export DB_STG="ETL_STAGING_DB"            # BTEQ staging/intermediate tables
export DB_DP="DATA_PRODUCTS_DB"           # Final certified data products

# -- SAS Configuration ---------------------------------------------------------
export SAS_HOME="/opt/SASHome/SASFoundation/9.4"
export SAS_CONFIG="/opt/SASHome/SASConfig/Lev1"
export SAS_BATCH="${SAS_HOME}/sas"
export SAS_AUTOEXEC="/opt/SASHome/SASConfig/Lev1/autoexec.sas"

# -- Path Configuration --------------------------------------------------------
export PIPELINE_HOME="/opt/etl/retail_banking_analytics"
export BTEQ_DIR="${PIPELINE_HOME}/bteq"
export SAS_DIR="${PIPELINE_HOME}/sas"
export LOG_DIR="${PIPELINE_HOME}/logs"
export ARCHIVE_DIR="${PIPELINE_HOME}/archive"

# -- Run Parameters ------------------------------------------------------------
export RUN_DATE=$(date +%Y%m%d)
export RUN_TIMESTAMP=$(date +%Y%m%d_%H%M%S)
export LOOKBACK_MONTHS=12
export RISK_SCORE_THRESHOLD=700

# -- Logging -------------------------------------------------------------------
export LOG_LEVEL="INFO"   # DEBUG | INFO | WARN | ERROR
